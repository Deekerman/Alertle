dispatcharr:
  url: "http://localhost:8080"      # Dispatcharr base URL
  token: "YOUR_API_TOKEN"           # API token (optional for output endpoints)
  # Paste the exact XMLTV URL from Dispatcharr → Output (recommended)
  # e.g. http://192.168.1.19:9191/output/epg/Everything
  xmltv_url: ""
  # EPG lookahead in days (scans from now until now + lookahead_days)
  lookahead_days: 7

# How often to poll when running in --daemon mode (seconds)
poll_interval_seconds: 300

# How many minutes before event start to send the notification
# Can be overridden per subscription
default_lead_time_minutes: 30

# Cross-reference ESPN's free API to skip replays.
# When true, each matched event is checked: if ESPN shows the game completed
# more than 4 hours before the EPG broadcast starts, the notification is
# suppressed. Falls back to notifying when ESPN has no data for the sport.
espn_verify: false

# ── Notification message templates ──────────────────────────────────────────
# Available variables: {rule} {title} {subtitle} {time} {date} {channels}
#                      {duration} {description}
notification_template:
  title: "[{rule}] {title}"
  body: "Time    : {time}  ({duration} min)\nChannel : {channels}\n{description}"

# ── Notification channels ───────────────────────────────────────────────────
# Leave a section empty / comment it out to disable that channel.

notifications:
  telegram:
    enabled: false
    bot_token: "YOUR_BOT_TOKEN"
    chat_id: "YOUR_CHAT_ID"

  pushover:
    enabled: false
    app_token: "YOUR_APP_TOKEN"
    user_key: "YOUR_USER_KEY"
    # priority: 0  # -2 silent, -1 quiet, 0 normal, 1 high, 2 emergency

  ntfy:
    enabled: false
    url: "https://ntfy.sh"          # or your self-hosted instance
    topic: "epg-sports"
    # token: ""                     # only needed for private topics

  discord:
    enabled: false
    webhook_url: "https://discord.com/api/webhooks/..."

  smtp:
    enabled: false
    host: "smtp.example.com"
    port: 587
    username: "user@example.com"
    password: "YOUR_PASSWORD"
    from_addr: "user@example.com"
    to_addrs:
      - "you@example.com"
    use_tls: true

# ── Watch list ──────────────────────────────────────────────────────────────
# Each entry is a subscription rule. All matching events will trigger a
# notification. Rules are OR-ed; within a rule, all fields are AND-ed.
#
# Fields:
#   sport   – match the EPG category/genre (case-insensitive substring)
#   team    – match anywhere in the programme title or description
#   keyword – match anywhere in title or description (fallback / freeform)
#   channel – restrict to a specific channel name or id (optional)
#   lead_time_minutes – override default lead time for this rule (optional)
#   label   – friendly name shown in the notification

subscriptions:
  - label: "All NFL games"
    sport: "american football"

  - label: "Dallas Cowboys"
    team: "Cowboys"

  - label: "Champions League"
    keyword: "Champions League"
    lead_time_minutes: 60

  - label: "Toronto Blue Jays"
    title_pattern: "^MLB Baseball$"
    subtitle_pattern: "(Toronto Blue Jays at .+|.+ at Toronto Blue Jays)"

  # - label: "All Hockey"
  #   sport: "ice hockey"

  # - label: "Lakers games"
  #   team: "Lakers"
  #   channel: "ESPN"
