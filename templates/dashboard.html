{% extends "base.html" %}
{% block content %}

<!-- Page header -->
<div class="px-8 pt-8 pb-6 border-b border-border flex items-center justify-between">
  <div>
    <h1 class="text-lg font-semibold text-white">Dashboard</h1>
    <p class="text-sm text-muted mt-0.5">Upcoming matched events</p>
  </div>
  <div class="flex items-center gap-2">
    <span id="scan-status" class="text-xs text-muted"></span>
    <button
      hx-post="/action/scan"
      hx-target="#scan-status"
      hx-swap="innerHTML"
      hx-on::after-request="setTimeout(() => htmx.trigger('#scan-log-area', 'refresh'), 2500)"
      class="btn-secondary text-xs"
    >
      <svg class="w-3.5 h-3.5 htmx-indicator" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/>
      </svg>
      Scan Now
    </button>
  </div>
</div>

<div class="px-8 py-6">
  <div
    id="matches-area"
    hx-get="/partial/matches"
    hx-trigger="load"
    hx-swap="innerHTML"
  >
    {% include "partials/loading.html" %}
  </div>
</div>

<!-- Scan log -->
<div class="px-8 pb-8">
  <details class="card overflow-hidden" id="scan-log-details">
    <summary class="px-5 py-3 text-xs font-medium text-muted cursor-pointer select-none
                    hover:text-gray-300 flex items-center gap-2 list-none">
      <svg class="w-3.5 h-3.5 shrink-0 transition-transform duration-150 [[open]_&]:rotate-90"
           fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="m9 18 6-6-6-6"/>
      </svg>
      Scan Log
      <button
        class="ml-auto btn-ghost text-xs py-0.5 px-2"
        hx-get="/partial/scan-log"
        hx-target="#scan-log-area"
        hx-swap="innerHTML"
        @click.prevent.stop
      >Refresh</button>
    </summary>
    <div class="border-t border-border overflow-auto max-h-80"
         id="scan-log-area"
         hx-get="/partial/scan-log"
         hx-trigger="intersect once, refresh"
         hx-swap="innerHTML">
      <p class="text-xs text-muted text-center py-6">Loading…</p>
    </div>
  </details>
</div>

<!-- Preview modal — lives outside the HTMX swap area so Alpine state persists -->
<template x-if="$store.previewModal.open">
  <div class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center"
       @click.self="$store.previewModal.close()"
       @keydown.escape.window="$store.previewModal.close()">
    <div class="bg-surface border border-border rounded-xl p-6 max-w-md w-full mx-4 shadow-2xl">
      <div class="flex items-center justify-between mb-4">
        <p class="text-sm font-semibold text-white">Notification Preview</p>
        <button @click="$store.previewModal.close()" class="text-muted hover:text-gray-300 transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="bg-bg rounded-lg px-3 py-2.5 mb-3">
        <p class="text-[10px] text-muted uppercase tracking-wide mb-1">Title</p>
        <p class="text-sm font-semibold text-white" x-text="$store.previewModal.notifTitle"></p>
      </div>
      <div class="bg-bg rounded-lg px-3 py-2.5 mb-4">
        <p class="text-[10px] text-muted uppercase tracking-wide mb-1">Body</p>
        <pre class="text-xs text-gray-300 whitespace-pre-wrap font-sans leading-relaxed" x-text="$store.previewModal.notifBody"></pre>
      </div>
      <p class="text-xs text-muted mb-4">
        Sends via: <span class="text-gray-300" x-text="$store.previewModal.notifVia || 'all enabled channels'"></span>
      </p>
      <div class="flex justify-end gap-2">
        <button @click="$store.previewModal.close()" class="btn-ghost text-xs">Close</button>
        <button @click="$store.previewModal.sendTest()" :disabled="$store.previewModal.sending" class="btn-primary text-xs">
          <template x-if="!$store.previewModal.sending"><span>Send test notification</span></template>
          <template x-if="$store.previewModal.sending"><span>Sending…</span></template>
        </button>
      </div>
    </div>
  </div>
</template>

{% endblock %}

{% block extra_scripts %}
<script>
window.NOTIF_TEMPLATES = {
  title: {{ notification_template.title | tojson | safe }},
  body: {{ notification_template.body | tojson | safe }},
};
</script>
{% endblock %}
