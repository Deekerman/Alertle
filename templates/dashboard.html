{% extends "base.html" %}
{% block content %}

<!-- Page header -->
<div class="px-8 pt-8 pb-6 border-b border-border flex items-center justify-between">
  <div>
    <h1 class="text-lg font-semibold text-white">Dashboard</h1>
    <p class="text-sm text-muted mt-0.5">Upcoming matched events</p>
  </div>
  <div class="flex items-center gap-2">
    <span id="scan-status" class="text-xs text-muted"></span>
    <button
      hx-post="/action/scan"
      hx-target="#scan-status"
      hx-swap="innerHTML"
      class="btn-secondary text-xs"
    >
      <svg class="w-3.5 h-3.5 htmx-indicator" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/>
      </svg>
      Scan Now
    </button>
    <button
      hx-get="/partial/matches"
      hx-target="#matches-area"
      hx-swap="innerHTML"
      class="btn-ghost text-xs"
    >
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/>
      </svg>
      Refresh
    </button>
  </div>
</div>

<div class="px-8 py-6">
  <div
    id="matches-area"
    hx-get="/partial/matches"
    hx-trigger="load"
    hx-swap="innerHTML"
  >
    {% include "partials/loading.html" %}
  </div>
</div>

{% endblock %}
